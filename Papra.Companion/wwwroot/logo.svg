<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
    <defs>
        <linearGradient id="papra" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3A8A"/>
            <stop offset="100%" stop-color="#3B82F6"/>
        </linearGradient>
        <linearGradient id="papraFold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3A8A"/>
            <stop offset="50%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#60A5FA"/>
        </linearGradient>
        <linearGradient id="comp" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0F766E"/>
            <stop offset="50%" stop-color="#14B8A6"/>
            <stop offset="100%" stop-color="#2DD4BF"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="4" dy="12" stdDeviation="16" flood-color="#0F766E" flood-opacity="0.25"/>
        </filter>
        <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-2" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="transparent"/>

    <g filter="url(#shadow)">
        <path d="M 120 140
                 C 120 118, 138 100, 160 100
                 L 260 100
                 L 320 160
                 L 320 260
                 A 40 40 0 0 1 320 340
                 L 320 460
                 C 320 482, 302 500, 280 500
                 L 160 500
                 C 138 500, 120 482, 120 460
                 Z" fill="url(#papra)"/>
        <path d="M 260 100 L 260 148 C 260 155, 265 160, 272 160 L 320 160 Z" fill="url(#papraFold)" filter="url(#foldShadow)"/>

        <rect x="160" y="200" width="100" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
        <rect x="160" y="230" width="70" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
        <rect x="160" y="380" width="120" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
        <rect x="160" y="410" width="90" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
    </g>

    <g transform="translate(35, 0)" filter="url(#glow)">
        <path d="M 320 180
                 L 440 180
                 C 462 180, 480 198, 480 220
                 L 480 400
                 C 480 422, 462 440, 440 440
                 L 320 440
                 L 320 340
                 A 40 40 0 0 0 320 260
                 L 320 180
                 Z" fill="url(#comp)"/>

        <circle cx="360" cy="230" r="10" fill="#ffffff" opacity="0.9"/>
        <circle cx="395" cy="230" r="10" fill="#ffffff" opacity="0.5"/>
        <circle cx="430" cy="230" r="10" fill="#ffffff" opacity="0.5"/>
        <rect x="350" y="280" width="90" height="8" rx="4" fill="#ffffff" opacity="0.6"/>
        <rect x="350" y="310" width="60" height="8" rx="4" fill="#ffffff" opacity="0.6"/>
        <rect x="350" y="390" width="90" height="8" rx="4" fill="#ffffff" opacity="0.6"/>
    </g>

</svg>
