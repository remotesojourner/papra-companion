assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
mode: Mainline
tag-prefix: "v"
major-version-bump-message: "(feat|refactor|fix).*!:|BREAKING CHANGE"
minor-version-bump-message: "^feat"
patch-version-bump-message: "^fix|^perf|^refactor|^chore|^docs|^ci|^style|^test"
branches:
  main:
    regex: ^main$
    label: ""
    increment: Patch
    prevent-increment-of-merged-branch-version: true
  pull-request:
    regex: ^(pull|pull-requests|pr)[/-]
    label: "pr{BranchName}"
    increment: Inherit
ignore:
  sha: []
